name: Deploy to Cloud Run

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  PROJECT_ID: ovapy-492520
  REGION: us-central1
  SERVICE_NAME: ovapy-api
  REGISTRY: us-central1-docker.pkg.dev

jobs:
  deploy:
    name: Build, Migrate & Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:latest

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      - name: Create terraform.tfvars
        working-directory: ./terraform
        run: |
          cat > terraform.tfvars <<EOF
          project_id = "${{ env.PROJECT_ID }}"
          region     = "${{ env.REGION }}"

          service_name        = "${{ env.SERVICE_NAME }}"
          docker_image        = "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          service_memory      = "512Mi"
          service_cpu         = "1"
          min_instances       = 1
          max_instances       = 10
          timeout_seconds     = 300
          allow_public_access = true

          app_env          = "production"
          admin_api_key    = "${{ secrets.ADMIN_API_KEY }}"
          owner_jwt_secret = "${{ secrets.OWNER_JWT_SECRET }}"

          db_name                = "ovapy"
          db_username            = "${{ secrets.DB_USERNAME }}"
          db_password            = "${{ secrets.DB_PASSWORD }}"
          db_tier                = "db-f1-micro"
          db_high_availability   = false
          db_deletion_protection = true

          whatsapp_token        = "${{ secrets.WHATSAPP_TOKEN }}"
          ovapy_phone_number_id = "${{ secrets.OVAPY_PHONE_NUMBER_ID }}"
          whatsapp_verify_token = "${{ secrets.WHATSAPP_VERIFY_TOKEN }}"

          openai_api_key = "${{ secrets.OPENAI_API_KEY }}"

          google_client_id     = "${{ secrets.GOOGLE_CLIENT_ID }}"
          google_client_secret = "${{ secrets.GOOGLE_CLIENT_SECRET }}"

          common_labels = {
            project   = "ovapy-api"
            terraform = "true"
          }
          EOF

      - name: Deploy with Terraform
        working-directory: ./terraform
        env:
          TF_WORKSPACE: ov-api
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Get service URL
        id: tf_outputs
        working-directory: ./terraform
        env:
          TF_WORKSPACE: ov-api
        run: |
          SERVICE_URL=$(terraform output -raw service_url)
          echo "service_url=$SERVICE_URL" >> $GITHUB_OUTPUT

      - name: Verify deployment
        run: |
          echo "Service deployed at: ${{ steps.tf_outputs.outputs.service_url }}"
          sleep 10
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" ${{ steps.tf_outputs.outputs.service_url }}/health)
          if [ $HTTP_CODE -eq 200 ]; then
            echo "Health check passed"
          else
            echo "Health check failed with status: $HTTP_CODE"
            exit 1
          fi

      - name: Deployment summary
        if: success()
        run: |
          echo "Deployment successful!"
          echo "Service: ${{ env.SERVICE_NAME }}"
          echo "Image: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          echo "URL: ${{ steps.tf_outputs.outputs.service_url }}"
